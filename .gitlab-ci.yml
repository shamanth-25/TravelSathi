stages:

* lint
* security
* test

lint:
stage: lint
image: python:3.11
script:
- pip install ruff mypy
- ruff check .
- mypy .

security:
stage: security
image: python:3.11
script:
- pip install bandit pip-audit
- bandit -r .
- pip-audit

tests:
stage: test
image: python:3.11
script:
- pip install pytest pytest-cov
- pytest --cov=.
